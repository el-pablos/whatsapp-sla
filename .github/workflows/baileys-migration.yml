name: Baileys Migration CI/CD

on:
  push:
    branches: [baileys-tama]
  pull_request:
    branches: [main]
    paths:
      - 'app/Services/WhatsApp/**'
      - 'app/Http/Controllers/WhatsApp/**'
      - 'tests/Feature/WhatsApp/**'
      - 'tests/Unit/WhatsApp/**'
      - 'config/whatsapp.php'
      - 'package.json'
      - 'package-lock.json'

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'

jobs:
  baileys-validation:
    name: Baileys Setup Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Validate Baileys installation
        run: |
          echo "Validating @whiskeysockets/baileys installation..."
          npm ls @whiskeysockets/baileys || echo "Baileys not installed yet"

      - name: Check WhatsApp config
        run: |
          if [ -f "config/whatsapp.php" ]; then
            echo "✓ WhatsApp config exists"
            php -l config/whatsapp.php
          else
            echo "⚠ WhatsApp config not found - will be created in implementation"
          fi

      - name: Validate session directory structure
        run: |
          echo "Checking session directory structure..."
          mkdir -p storage/app/whatsapp/sessions
          mkdir -p storage/app/whatsapp/qr
          mkdir -p storage/app/whatsapp/logs
          echo "✓ Session directories ready"

  whatsapp-security-scan:
    name: WhatsApp Security Validation
    runs-on: ubuntu-latest
    needs: baileys-validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: |
          npm ci
          composer install --prefer-dist --no-interaction

      - name: Check for session file leaks
        run: |
          echo "Checking for accidentally committed session files..."
          if find . -name "*.json" -path "*/sessions/*" -o -name "creds.json" -o -name "pre-key*.json" | grep -v node_modules; then
            echo "❌ SECURITY RISK: Session files found in repository!"
            exit 1
          else
            echo "✓ No session files in repository"
          fi

      - name: Validate .gitignore patterns
        run: |
          echo "Checking .gitignore for WhatsApp session patterns..."
          if grep -q "sessions/" .gitignore && grep -q "creds.json" .gitignore; then
            echo "✓ Session files properly ignored"
          else
            echo "❌ Missing session ignore patterns in .gitignore"
            exit 1
          fi

      - name: Check environment variables
        run: |
          echo "Validating environment variable patterns..."
          if [ -f ".env.example" ]; then
            if grep -q "WHATSAPP_" .env.example || [ ! -s .env.example ]; then
              echo "✓ Environment example ready"
            else
              echo "⚠ No WhatsApp environment variables in .env.example"
            fi
          fi

      - name: Run security audit
        run: |
          npm audit --audit-level=moderate
          composer audit

  whatsapp-tests:
    name: WhatsApp Integration Tests
    runs-on: ubuntu-latest
    needs: [baileys-validation, whatsapp-security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: xdebug

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: |
          npm ci
          composer install --prefer-dist --no-interaction

      - name: Copy environment and generate key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Create test database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run WhatsApp service tests
        run: |
          if [ -d "tests/Unit/WhatsApp" ] || [ -d "tests/Feature/WhatsApp" ]; then
            ./vendor/bin/pest tests/Unit/WhatsApp tests/Feature/WhatsApp --coverage --min=80
          else
            echo "⚠ WhatsApp tests not implemented yet"
            # Run existing tests to ensure no regression
            ./vendor/bin/pest --stop-on-failure
          fi

  baileys-integration:
    name: Baileys Integration Check
    runs-on: ubuntu-latest
    needs: whatsapp-tests
    if: github.ref == 'refs/heads/baileys-tama'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite

      - name: Install dependencies
        run: |
          npm ci
          composer install --prefer-dist --no-interaction

      - name: Test Baileys socket creation (dry run)
        run: |
          cat > test-baileys.js << 'EOF'
          const { makeWASocket, useMultiFileAuthState } = require('@whiskeysockets/baileys');
          const { Boom } = require('@hapi/boom');

          async function testBaileysSetup() {
            try {
              console.log('Testing Baileys setup...');

              // Test import
              console.log('✓ Baileys imports successful');

              // Test auth state creation (without actual connection)
              const { state, saveCreds } = await useMultiFileAuthState('./test-session');
              console.log('✓ Auth state creation successful');

              console.log('✓ Baileys setup validation passed');

              // Cleanup test session
              const fs = require('fs');
              if (fs.existsSync('./test-session')) {
                fs.rmSync('./test-session', { recursive: true, force: true });
              }

            } catch (error) {
              console.error('❌ Baileys setup failed:', error.message);
              process.exit(1);
            }
          }

          testBaileysSetup();
          EOF

          if npm list @whiskeysockets/baileys > /dev/null 2>&1; then
            node test-baileys.js
            rm test-baileys.js
          else
            echo "⚠ Baileys not installed yet - skipping integration test"
          fi

  migration-readiness:
    name: Migration Readiness Check
    runs-on: ubuntu-latest
    needs: [baileys-integration]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check migration checklist
        run: |
          echo "Validating migration readiness..."

          CHECKLIST_PASSED=0
          CHECKLIST_TOTAL=8

          # 1. Config file
          if [ -f "config/whatsapp.php" ]; then
            echo "✓ WhatsApp configuration file exists"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ WhatsApp configuration file missing"
          fi

          # 2. Service provider
          if [ -f "app/Providers/WhatsAppServiceProvider.php" ]; then
            echo "✓ WhatsApp service provider exists"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ WhatsApp service provider missing"
          fi

          # 3. Core service
          if [ -f "app/Services/WhatsApp/BaileysSocketService.php" ]; then
            echo "✓ Baileys socket service exists"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ Baileys socket service missing"
          fi

          # 4. Session manager
          if [ -f "app/Services/WhatsApp/SessionManager.php" ]; then
            echo "✓ Session manager exists"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ Session manager missing"
          fi

          # 5. Message processor
          if [ -f "app/Services/WhatsApp/MessageProcessor.php" ]; then
            echo "✓ Message processor exists"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ Message processor missing"
          fi

          # 6. Controller
          if [ -f "app/Http/Controllers/WhatsAppController.php" ]; then
            echo "✓ WhatsApp controller exists"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ WhatsApp controller missing"
          fi

          # 7. Routes
          if grep -q "whatsapp" routes/api.php 2>/dev/null; then
            echo "✓ WhatsApp routes configured"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ WhatsApp routes missing"
          fi

          # 8. Tests
          if [ -d "tests/Feature/WhatsApp" ] || [ -d "tests/Unit/WhatsApp" ]; then
            echo "✓ WhatsApp tests exist"
            ((CHECKLIST_PASSED++))
          else
            echo "❌ WhatsApp tests missing"
          fi

          echo ""
          echo "Migration Readiness: $CHECKLIST_PASSED/$CHECKLIST_TOTAL components ready"

          if [ $CHECKLIST_PASSED -eq $CHECKLIST_TOTAL ]; then
            echo "🎉 Migration ready for production!"
            echo "::notice::All migration components implemented and ready"
          elif [ $CHECKLIST_PASSED -ge 6 ]; then
            echo "⚠ Migration mostly ready - $((CHECKLIST_TOTAL - CHECKLIST_PASSED)) components missing"
            echo "::warning::Migration components incomplete but can proceed"
          else
            echo "❌ Migration not ready - too many components missing"
            echo "::error::Migration requires more components before merge"
            exit 1
          fi