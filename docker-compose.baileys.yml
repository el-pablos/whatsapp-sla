version: '3.8'

services:
  baileys:
    build:
      context: ./baileys-service
      dockerfile: Dockerfile
    container_name: whatsapp-sla-baileys
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379/1
      - SESSION_PATH=/app/sessions
    volumes:
      - ./storage/app/whatsapp-sessions:/app/sessions:rw
    ports:
      - "3001:3001"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - whatsapp-sla

  redis:
    image: redis:7-alpine
    container_name: whatsapp-sla-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - whatsapp-sla

volumes:
  redis-data:
    driver: local

networks:
  whatsapp-sla:
    driver: bridge
